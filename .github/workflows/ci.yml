name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Show tool versions
        run: |
          node --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Run type checks
        run: bun run typecheck

      - name: Build packages and app
        run: bun run build

  deploy-production:
    name: Deploy production
    needs: test-build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://schngn.com
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Show tool versions
        run: |
          node --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages and app
        run: bun run build

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: bun run deploy

      - name: Run production smoke checks
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: bun run smoke:production

      - name: Skip deploy when Cloudflare credentials are not configured
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "Cloudflare credentials are not configured for the production environment; skipping deploy."
