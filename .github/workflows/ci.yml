name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Show tool versions
        run: |
          node --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Run type checks
        run: bun run typecheck

      - name: Build packages and app
        run: bun run build

      - name: Smoke compiled agent interfaces
        run: bun run smoke:agent

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run browser tests
        run: bun run test:e2e

  deploy-production:
    name: Deploy production
    needs: test-build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: schngn-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://schngn.com
    env:
      INFISICAL_IDENTITY_ID: 812097c6-b028-4a21-9af0-291ebc835cfa
      INFISICAL_PROJECT_ID: 44e3b68f-6f17-458c-aaeb-da72b0faa793
      INFISICAL_OIDC_AUDIENCE: https://github.com/miktomic
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Show tool versions
        run: |
          node --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages and app
        run: >-
          node scripts/run-with-infisical-oidc.mjs
          --keys PUBLIC_CLERK_PUBLISHABLE_KEY,PUBLIC_TURNSTILE_SITE_KEY
          -- bun run build

      - name: Prepare Worker bindings for inactive upload
        shell: bash
        run: |
          set -euo pipefail
          secrets_file="${RUNNER_TEMP}/schngn-worker-bindings.json"
          umask 077
          node scripts/run-with-infisical-oidc.mjs \
            --keys PUBLIC_CLERK_PUBLISHABLE_KEY,CLERK_SECRET_KEY,CLERK_WEBHOOK_SIGNING_SECRET,PUBLIC_TURNSTILE_SITE_KEY,TURNSTILE_SECRET_KEY \
            -- node scripts/write-worker-bindings.mjs "${secrets_file}"

      - name: Provision Cloudflare resources without changing production traffic
        run: >-
          node scripts/run-with-infisical-oidc.mjs
          --keys CLOUDFLARE_API_TOKEN,CLOUDFLARE_ACCOUNT_ID
          -- bash -c 'cd apps/web && bunx wrangler versions upload
          --secrets-file "${RUNNER_TEMP}/schngn-worker-bindings.json"'

      - name: Remove inactive Worker bindings
        if: ${{ always() }}
        shell: bash
        run: rm -f -- "${RUNNER_TEMP}/schngn-worker-bindings.json"

      - name: Apply D1 migrations
        run: >-
          node scripts/run-with-infisical-oidc.mjs
          --keys CLOUDFLARE_API_TOKEN,CLOUDFLARE_ACCOUNT_ID
          -- bun run d1:migrate:remote

      - name: Prepare Worker bindings for deployment
        shell: bash
        run: |
          set -euo pipefail
          secrets_file="${RUNNER_TEMP}/schngn-worker-bindings.json"
          umask 077
          node scripts/run-with-infisical-oidc.mjs \
            --keys PUBLIC_CLERK_PUBLISHABLE_KEY,CLERK_SECRET_KEY,CLERK_WEBHOOK_SIGNING_SECRET,PUBLIC_TURNSTILE_SITE_KEY,TURNSTILE_SECRET_KEY \
            -- node scripts/write-worker-bindings.mjs "${secrets_file}"

      - name: Deploy to Cloudflare Workers
        run: >-
          node scripts/run-with-infisical-oidc.mjs
          --keys CLOUDFLARE_API_TOKEN,CLOUDFLARE_ACCOUNT_ID
          -- bash -c 'cd apps/web && bunx wrangler deploy
          --secrets-file "${RUNNER_TEMP}/schngn-worker-bindings.json"'

      - name: Remove deployment Worker bindings
        if: ${{ always() }}
        shell: bash
        run: rm -f -- "${RUNNER_TEMP}/schngn-worker-bindings.json"

      - name: Configure canonical www redirect
        run: >-
          node scripts/run-with-infisical-oidc.mjs
          --keys CLOUDFLARE_API_TOKEN,CLOUDFLARE_ACCOUNT_ID
          -- bun run cloudflare:canonical-www

      - name: Run production smoke checks
        run: bun run smoke:production
