name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Show tool versions
        run: |
          node --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Run type checks
        run: bun run typecheck

      - name: Build packages and app
        run: bun run build

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run browser tests
        run: bun run test:e2e

  deploy-production:
    name: Deploy production
    needs: test-build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://schngn.com
    env:
      CLOUDFLARE_DEPLOY_CONFIGURED: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && (vars.CLOUDFLARE_ACCOUNT_ID != '' || secrets.CLOUDFLARE_ACCOUNT_ID != '') }}
      PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Show tool versions
        run: |
          node --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages and app
        run: bun run build

      - name: Prepare Clerk Worker bindings
        if: ${{ env.CLOUDFLARE_DEPLOY_CONFIGURED == 'true' }}
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SIGNING_SECRET: ${{ secrets.CLERK_WEBHOOK_SIGNING_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PUBLIC_CLERK_PUBLISHABLE_KEY:-}" || -z "${CLERK_SECRET_KEY:-}" || -z "${CLERK_WEBHOOK_SIGNING_SECRET:-}" ]]; then
            echo "::error::Required Clerk production configuration is missing."
            exit 1
          fi
          secrets_file="${RUNNER_TEMP}/schngn-worker-bindings.json"
          umask 077
          node --input-type=module -e '
            import { writeFileSync } from "node:fs";
            const bindings = {
              PUBLIC_CLERK_PUBLISHABLE_KEY: process.env.PUBLIC_CLERK_PUBLISHABLE_KEY,
              CLERK_SECRET_KEY: process.env.CLERK_SECRET_KEY,
              CLERK_WEBHOOK_SIGNING_SECRET: process.env.CLERK_WEBHOOK_SIGNING_SECRET
            };
            writeFileSync(process.argv[1], JSON.stringify(bindings), { mode: 0o600 });
          ' "${secrets_file}"

      - name: Provision Cloudflare resources without changing production traffic
        if: ${{ env.CLOUDFLARE_DEPLOY_CONFIGURED == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/web
        run: bunx wrangler versions upload --secrets-file "${RUNNER_TEMP}/schngn-worker-bindings.json"

      - name: Apply D1 migrations
        if: ${{ env.CLOUDFLARE_DEPLOY_CONFIGURED == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run d1:migrate:remote

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CLOUDFLARE_DEPLOY_CONFIGURED == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/web
        run: bunx wrangler deploy --secrets-file "${RUNNER_TEMP}/schngn-worker-bindings.json"

      - name: Remove temporary Worker bindings
        if: ${{ always() }}
        shell: bash
        run: rm -f -- "${RUNNER_TEMP}/schngn-worker-bindings.json"

      - name: Configure canonical www redirect
        if: ${{ env.CLOUDFLARE_DEPLOY_CONFIGURED == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run cloudflare:canonical-www

      - name: Run production smoke checks
        if: ${{ env.CLOUDFLARE_DEPLOY_CONFIGURED == 'true' }}
        run: bun run smoke:production

      - name: Skip deploy when Cloudflare credentials are not configured
        if: ${{ env.CLOUDFLARE_DEPLOY_CONFIGURED != 'true' }}
        run: |
          echo "Cloudflare credentials are not configured for the production environment; skipping deploy."
